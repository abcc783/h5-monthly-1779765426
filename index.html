<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>月末全厂安全隐患排查记录单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f3f4f6;color:#111827;font-size:14px;-webkit-font-smoothing:antialiased;padding-bottom:80px}
.navbar{background:linear-gradient(135deg,#c2410c 0%,#ea580c 50%,#f59e0b 100%);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.navbar h1{font-size:16px;font-weight:600;letter-spacing:.5px}
.navbar .subtitle{font-size:11px;opacity:.85;margin-top:3px}
.progress-tip{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.92)}
.progress-tip .ok{color:#fef3c7}
.progress-tip .bad{color:#fecaca}
.card{margin:10px 12px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fafafa;border-bottom:1px solid #f1f5f9;font-weight:600;font-size:14px}
.card-title .left{display:flex;align-items:center;gap:8px}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:#ea580c}
.field-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f3f4f6}
.field-row:last-child{border-bottom:none}
.field-row .label{width:90px;color:#6b7280;font-size:13px;flex-shrink:0}
.field-row .value,.field-row select,.field-row input{flex:1;color:#111827;font-size:14px;border:none;outline:none;background:transparent;text-align:right}
.field-row select{appearance:none;-webkit-appearance:none;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 4.5l3 3 3-3' fill='none' stroke='%239ca3af' stroke-width='1.4'/></svg>") right center/12px no-repeat;padding-right:18px}
.group{margin:10px 12px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.group-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fafafa;border-bottom:1px solid #f1f5f9;cursor:pointer}
.group-head .left{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
.group-head .idx{width:22px;height:22px;border-radius:50%;background:#ea580c;color:#fff;font-size:11px;display:inline-flex;align-items:center;justify-content:center}
.group-head .right{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280}
.group-head .badge{padding:2px 8px;border-radius:12px;background:#fef3c7;color:#b45309;font-weight:500}
.group-head .badge.ok{background:#fed7aa;color:#9a3412}
.group-head .chev{transition:transform .3s}
.group.open .group-head .chev{transform:rotate(180deg)}
.group-body{display:none;padding:6px 0}
.group.open .group-body{display:block}
.item{padding:10px 14px;border-bottom:1px solid #f3f4f6}
.item:last-child{border-bottom:none}
.item .title{display:flex;align-items:flex-start;gap:6px;font-size:13.5px;font-weight:500;color:#111827;line-height:1.5;margin-bottom:4px}
.item .num{color:#9ca3af;font-size:12px;flex-shrink:0;margin-top:1px}
.item .std{font-size:11.5px;color:#9ca3af;margin-bottom:8px;line-height:1.5;padding-left:18px}
.btns{display:flex;gap:8px;padding-left:18px}
.btn{flex:1;height:34px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:13px;color:#6b7280;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.btn.ok.sel{background:#dcfce7;border-color:#16a34a;color:#15803d}
.btn.bad.sel{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.abnormal{margin-top:8px;margin-left:18px;padding:8px 10px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;display:none}
.abnormal.show{display:block}
.abnormal label{display:block;font-size:11.5px;color:#9a3412;margin-bottom:4px;margin-top:6px}
.abnormal label:first-child{margin-top:0}
.abnormal textarea{width:100%;min-height:50px;padding:7px 9px;border:1px solid #fecaca;border-radius:6px;font-size:13px;color:#111827;outline:none;resize:none;background:#fff;font-family:inherit}
.summary textarea{width:100%;min-height:60px;padding:9px;border:1px solid #e5e7eb;border-radius:6px;font-size:13.5px;color:#111827;outline:none;resize:none;background:#fff;font-family:inherit;margin:8px 14px;width:calc(100% - 28px)}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px 14px;border-top:1px solid #e5e7eb;display:flex;gap:10px;align-items:center;z-index:9}
.bottom .stat{font-size:11px;color:#6b7280;flex:1}
.bottom .stat span{font-weight:600;color:#ea580c}
.submit-btn{flex:0 0 auto;height:42px;padding:0 28px;background:linear-gradient(135deg,#c2410c,#ea580c);color:#fff;border:none;border-radius:21px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(234,88,12,.3)}
.submit-btn:disabled{background:#d1d5db;box-shadow:none}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:11px 18px;background:rgba(0,0,0,.82);color:#fff;font-size:13.5px;border-radius:8px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:50}
.mask.show{display:flex}
.mask .box{width:80%;max-width:300px;background:#fff;border-radius:12px;padding:18px;text-align:center}
.mask .box h3{font-size:15px;margin-bottom:8px}
.mask .box p{font-size:13px;color:#6b7280;margin-bottom:14px;line-height:1.5}
.mask .box button{height:38px;width:100%;background:#ea580c;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600}
</style>
</head>
<body>

<div class="navbar">
  <h1>月末全厂安全隐患排查记录单</h1>
  <div class="subtitle">天一合金 · 月度联合排查</div>
</div>
<div class="progress-tip">
  <div>当前 <span id="curDate"></span> · <span id="curMonth"></span></div>
  <div><span class="ok" id="okCnt">0</span> 正常 / <span class="bad" id="badCnt">0</span> 异常 / <span id="totalCnt">0</span> 总</div>
</div>

<div class="card">
  <div class="card-title"><div class="left"><span class="dot"></span>检查信息</div></div>
  <div class="field-row"><div class="label">检查月份</div><div class="value" id="monthVal"></div></div>
  <div class="field-row"><div class="label">检查日期</div><div class="value" id="dateVal"></div></div>
  <div class="field-row">
    <div class="label">检查人</div>
    <select id="inspector">
      <option value="">请选择</option>
      <option value="张海飞">张海飞</option>
      <option value="何荣生">何荣生</option>
      <option value="季慧">季慧</option>
      <option value="孙艳">孙艳</option>
    </select>
  </div>
</div>

<div id="groups"></div>

<div class="card summary">
  <div class="card-title"><div class="left"><span class="dot"></span>总结</div></div>
  <textarea id="summary" placeholder="本月排查总体情况、整改进度、需协调事项..."></textarea>
</div>

<div class="bottom">
  <div class="stat">已检 <span id="doneCnt">0</span> / <span id="allCnt">0</span></div>
  <button class="submit-btn" id="submitBtn">提交</button>
</div>

<div class="toast" id="toast"></div>
<div class="mask" id="successMask">
  <div class="box">
    <h3>提交成功</h3>
    <p id="successMsg">本次排查已记录到 Bitable。</p>
    <button onclick="document.getElementById('successMask').classList.remove('show')">知道了</button>
  </div>
</div>

<script>
// 严格按 xlsx《月末全厂安全隐患排查记录单》原内容（新版）拆分
// 9 大类，每类的检查项与备注（合格标准）一一对应
const DATA = [
  {cat:"热水槽", items:[
    {content:"水压", std:"≥0.1MPA"},
    {content:"水温", std:"60-65℃"},
    {content:"水液位", std:"90-100"},
    {content:"管道泵状态", std:"一台工作"}
  ]},
  {cat:"黄磷槽", items:[
    {content:"水温", std:"≥60℃"},
    {content:"水液位（磁翻板）", std:"≥1000"},
    {content:"黄磷液位（磁翻板）", std:"≤1030（暂定）"},
    {content:"黄磷液位（电子）", std:"≤1428（暂定）"},
    {content:"洗眼器", std:"工作正常"}
  ]},
  {cat:"1#2#计量罐", items:[
    {content:"夹套水温", std:"50-55℃"}
  ]},
  {cat:"中频炉系统", items:[
    {content:"中频电柜", std:"异味，异响，螺丝发红，循环水管是否异常"},
    {content:"炉体", std:"中频炉胶木柱是否完整、是否开裂，胶木柱固定螺栓是否牢固、有松动；中频炉炉体周边是否存在积水或其他易燃易爆物品；检查感应圈胶泥是否剥落、是否露出打结料；检查 1#、2# 冷却塔温度、压力、流量监测报警是否正常；检查磁轭顶块顶杆是否齐全、是否松动"},
    {content:"模具情况", std:""},
    {content:"发电机情况", std:""},
    {content:"1#2# 冷却塔水压", std:"≥0.2MPA"},
    {content:"1#2# 冷却塔水位", std:"在液位计的红色标线以上"}
  ]},
  {cat:"环保设备", items:[
    {content:"除尘器", std:"直流输出电流≥100mA；直流输出电压＞50kV；皮带、螺栓、电机、紧固件有无损坏、松动异响等异常情况"},
    {content:"风机电箱", std:"箱内软启动显示旁路运行及电流数值（37-40A）"},
    {content:"跑冒滴漏情况", std:""},
    {content:"空压机", std:"接头、阀门、排水阀等是否正常运行"},
    {content:"污染源在线监控", std:"电源、联网接口，显示器等是否正常运行"}
  ]},
  {cat:"行车", items:[
    {content:"运行情况", std:"吊带、铁链、钢丝绳及夹头的磨损"}
  ]},
  {cat:"劳动防护用品", items:[
    {content:"佩戴情况", std:"安全帽，口罩，劳保鞋，手套等"}
  ]},
  {cat:"安全", items:[
    {content:"剪板机使用情况", std:"机身周围清洁、全系统是否漏油、开关按钮等"},
    {content:"挤压机使用情况", std:"机身周围清洁、全系统是否漏油、控制箱各电线按钮等"},
    {content:"叉车使用情况", std:"检查整车及各零部件是否有异常"},
    {content:"车间其他电气设备使用情况", std:""},
    {content:"配电房常规检查", std:"有无异味、异响，功率因素表数值"}
  ]},
  {cat:"环保", items:[
    {content:"生产、包装车间卫生秩序情况", std:""},
    {content:"危废仓库卫生及危废标签情况", std:""}
  ]}
];

// 时间初始化
function pad(n){return n<10?'0'+n:n}
const now = new Date();
document.getElementById('curDate').textContent = `${now.getMonth()+1}-${now.getDate()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
const monthStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
document.getElementById('curMonth').textContent = monthStr;
document.getElementById('dateVal').textContent = todayStr;
document.getElementById('monthVal').textContent = monthStr;

// 渲染分组
const groupsEl = document.getElementById('groups');
let totalItems = 0;
DATA.forEach((g, gi) => {
  totalItems += g.items.length;
  const items = g.items.map((it, ii) => {
    const stdHtml = it.std ? `<div class="std">${it.std}</div>` : `<div class="std">&nbsp;</div>`;
    return `
      <div class="item" data-gi="${gi}" data-ii="${ii}">
        <div class="title"><span class="num">${ii+1}.</span><span>${it.content}</span></div>
        ${stdHtml}
        <div class="btns">
          <button class="btn ok" onclick="setStatus(${gi},${ii},'ok',this)">√ 正常</button>
          <button class="btn bad" onclick="setStatus(${gi},${ii},'bad',this)">× 异常</button>
        </div>
        <div class="abnormal">
          <label>异常描述</label>
          <textarea data-role="remark" placeholder="说明异常的具体表现、位置、严重程度..."></textarea>
          <label>整改措施</label>
          <textarea data-role="fix" placeholder="临时措施 + 后续整改安排 + 责任人..."></textarea>
        </div>
      </div>`;
  }).join('');
  groupsEl.insertAdjacentHTML('beforeend', `
    <div class="group open" data-gi="${gi}">
      <div class="group-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="left"><span class="idx">${gi+1}</span>${g.cat}</div>
        <div class="right"><span class="badge ok"><span class="okN">0</span>/${g.items.length}</span><span class="chev">▾</span></div>
      </div>
      <div class="group-body">${items}</div>
    </div>`);
});
document.getElementById('totalCnt').textContent = totalItems;
document.getElementById('allCnt').textContent = totalItems;

// 状态管理
const state = {}; // key = gi-ii, val = {status, remark, fix}
function setStatus(gi, ii, st, btnEl){
  const key = `${gi}-${ii}`;
  state[key] = state[key] || {};
  state[key].status = st;
  const itm = btnEl.closest('.item');
  itm.querySelectorAll('.btn').forEach(b => b.classList.remove('sel'));
  btnEl.classList.add('sel');
  const ab = itm.querySelector('.abnormal');
  if (st === 'bad'){ ab.classList.add('show'); }
  else { ab.classList.remove('show'); state[key].remark = ''; state[key].fix = ''; }
  refreshCounts();
}
function refreshCounts(){
  let ok=0, bad=0, done=0;
  Object.values(state).forEach(s => {
    if (s.status === 'ok'){ ok++; done++; }
    if (s.status === 'bad'){ bad++; done++; }
  });
  document.getElementById('okCnt').textContent = ok;
  document.getElementById('badCnt').textContent = bad;
  document.getElementById('doneCnt').textContent = done;
  // 每个 group 的 badge 进度
  DATA.forEach((g, gi) => {
    let n = 0;
    g.items.forEach((_, ii) => { if (state[`${gi}-${ii}`]?.status === 'ok') n++; });
    const badge = document.querySelectorAll('.group')[gi].querySelector('.okN');
    if (badge) badge.textContent = n;
  });
}

// 提交逻辑
const WEBHOOK_URL = 'https://n8n.icecoke.xyz/webhook/monthly-check-v1';
const COOLDOWN_MS = 60 * 1000;
const DEDUP_WINDOW_MS = 30 * 60 * 1000;
const LS_HASH = 'h5monthly:lastSubmitHash';
const LS_TS = 'h5monthly:lastSubmitTs';

function djb2(str){
  let h = 5381;
  for (let i = 0; i < str.length; i++){ h = ((h << 5) + h) ^ str.charCodeAt(i); }
  return (h >>> 0).toString(16);
}
function uuid4(){
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const inspector = document.getElementById('inspector').value;
  if (!inspector){ showToast('请选择检查人'); return; }
  let unchecked = 0;
  DATA.forEach((g, gi) => g.items.forEach((_, ii) => {
    if (!state[`${gi}-${ii}`]?.status) unchecked++;
  }));
  if (unchecked > 0){ showToast(`还有 ${unchecked} 项未检查`); return; }

  // 收集 items + 整改/异常摘要
  const items = [];
  const anomalies = [];
  const fixes = [];
  DATA.forEach((g, gi) => g.items.forEach((it, ii) => {
    const s = state[`${gi}-${ii}`];
    const itm = document.querySelector(`.item[data-gi="${gi}"][data-ii="${ii}"]`);
    const remark = s.status === 'bad' ? (itm.querySelector('textarea[data-role="remark"]').value || '').trim() : '';
    const fix = s.status === 'bad' ? (itm.querySelector('textarea[data-role="fix"]').value || '').trim() : '';
    const ci = gi + 1, ii1 = ii + 1;
    items.push({
      category: `${ci}.${g.cat}`,
      category_index: ci,
      name: `${ii1}.${it.content}`,
      item_index: ii1,
      status: s.status === 'ok' ? '正常' : '异常',
      remark, fix
    });
    if (s.status === 'bad'){
      anomalies.push(`${ci}.${g.cat}-${ii1}.${it.content}${remark ? ' ('+remark+')' : ''}`);
      if (fix) fixes.push(`${ci}.${g.cat}-${ii1}.${it.content}: ${fix}`);
    }
  }));

  // 异常但未填整改措施 → 拦截
  const badNoFix = items.filter(x => x.status === '异常' && !x.fix);
  if (badNoFix.length){
    showToast(`有 ${badNoFix.length} 项异常未填整改措施`);
    return;
  }

  const summary = (document.getElementById('summary').value || '').trim();

  // dedup
  const fingerprint = djb2(JSON.stringify({inspector, items, summary}));
  const lastHash = localStorage.getItem(LS_HASH);
  const lastTs = parseInt(localStorage.getItem(LS_TS) || '0', 10);
  const nowMs = Date.now();
  if (lastHash === fingerprint && (nowMs - lastTs) < DEDUP_WINDOW_MS){
    showToast('30 分钟内已提交过相同内容');
    return;
  }
  if ((nowMs - lastTs) < COOLDOWN_MS){
    showToast('提交太快，请稍候');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  const payload = {
    date: todayStr,
    month: monthStr,
    inspector,
    items,
    anomaly_count: anomalies.length,
    anomaly_summary: anomalies.join('；'),
    fix_summary: fixes.join('；'),
    summary,
    client_submit_id: uuid4()
  };

  try {
    const r = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const txt = await r.text();
    let ok = false;
    try { ok = JSON.parse(txt).ok === true; } catch(e){}
    if (r.ok && ok){
      localStorage.setItem(LS_HASH, fingerprint);
      localStorage.setItem(LS_TS, String(nowMs));
      document.getElementById('successMsg').textContent =
        `本次共 ${items.length} 项，正常 ${items.length - anomalies.length} 项，异常 ${anomalies.length} 项。已记录。`;
      document.getElementById('successMask').classList.add('show');
      btn.textContent = '提交';
      btn.disabled = false;
    } else {
      showToast('提交失败：' + (txt.slice(0,80) || r.status));
      btn.textContent = '提交';
      btn.disabled = false;
    }
  } catch(e){
    showToast('网络异常：' + e.message);
    btn.textContent = '提交';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
